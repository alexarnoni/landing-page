<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040810"/>
      <stop offset="100%" stop-color="#070d18"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffe5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ffe5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#00ffe5" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow bottom -->
  <ellipse cx="600" cy="630" rx="500" ry="180" fill="#00ffe5" fill-opacity="0.08"/>

  <!-- Accent line top -->
  <rect x="80" y="80" width="60" height="3" fill="#00ffe5"/>

  <!-- Tag -->
  <text x="80" y="140" font-family="monospace" font-size="18" fill="#00ffe5" letter-spacing="4" opacity="0.8">&gt; ANALISTA DE DADOS &amp; DESENVOLVEDOR</text>

  <!-- Name -->
  <text x="80" y="260" font-family="sans-serif" font-size="96" font-weight="700" fill="#c8dde8" letter-spacing="-2">ALEXANDRE</text>
  <text x="80" y="370" font-family="sans-serif" font-size="96" font-weight="700" fill="none" stroke="#00ffe5" stroke-width="1.5" letter-spacing="-2">ARNONI</text>

  <!-- Subtitle -->
  <text x="80" y="440" font-family="monospace" font-size="22" fill="#7a9fb0" letter-spacing="1">Python · FastAPI · PostgreSQL · Power BI · Docker</text>

  <!-- Domain -->
  <text x="80" y="540" font-family="monospace" font-size="18" fill="#00ffe5" opacity="0.6" letter-spacing="2">alexarnoni.com</text>

  <!-- Accent line right -->
  <rect x="1060" y="80" width="60" height="3" fill="#ff3c6e"/>
  <rect x="1060" y="92" width="40" height="3" fill="#ff3c6e" opacity="0.5"/>
</svg>
