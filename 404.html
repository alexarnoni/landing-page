<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Página não encontrada</title>
  <meta name="description" content="A página que você tentou acessar não existe.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500;700&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap">
  <link rel="preload" href="/styles.css?v=2" as="style">
  <style>
    .sr-skip{position:absolute;left:-9999px;top:auto}
    .sr-skip:focus{left:1rem;top:1rem}

    .not-found-wrap {
      min-height: calc(100vh - var(--header-height, 4.25rem));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.5rem;
      gap: 1.5rem;
    }

    .not-found-code {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 700;
      color: #555584;
      line-height: 1;
      opacity: 0.15;
      user-select: none;
    }

    .not-found-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      color: #101033;
      margin: 0;
    }

    .not-found-desc {
      color: #B2B2D9;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      margin: 0;
    }

    .not-found-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #F8F8FA;
      background: #2B2B59;
      padding: 12px 28px;
      text-decoration: none;
      display: inline-block;
      border-radius: 980px;
      transition: background 0.2s;
    }

    .not-found-link:hover { background: #555584; color: #F8F8FA; }
  </style>
  <link rel="stylesheet" href="/styles.css?v=2">
</head>
<body class="hub-page">
  <a href="#main" class="sr-skip">Pular para o conteúdo</a>
  <div data-include="header"></div>

  <main id="main">
    <div class="not-found-wrap">
      <div class="not-found-code" aria-hidden="true">404</div>
      <h1 class="not-found-title">Página não encontrada</h1>
      <p class="not-found-desc">// a rota que você tentou acessar não existe neste universo</p>
      <a href="/" class="not-found-link">Voltar ao início</a>
    </div>
  </main>

  <div data-include="footer"></div>

  <script src="/include-partials.js"></script>
  <script src="/main.js"></script>
</body>
</html>
